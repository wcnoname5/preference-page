<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2AFC 偏好選擇實驗 Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>2AFC 偏好選擇實驗</h1>

    <!-- 設定區 -->
    <section id="setup">
      <form id="setup-form">
        <fieldset>
          <legend>更新演算法</legend>
          <label><input type="radio" name="algorithm" value="HaB" checked /> HaB</label>
          <label><input type="radio" name="algorithm" value="BiM" disabled /> BiM（未實作）</label>
          <label><input type="radio" name="algorithm" value="ASA" disabled /> ASA（未實作）</label>
          <label><input type="radio" name="algorithm" value="BiM-S" disabled /> BiM-S（未實作）</label>
        </fieldset>

        <fieldset>
          <legend>結束條件</legend>
          <label>
            <input type="radio" name="stop" value="fixed" checked /> 固定 iteration 數：
            <input type="number" id="iterations" value="5" min="1" />
          </label>
          <label>
            <input type="radio" name="stop" value="convergence" /> 收斂（stepSize &lt;）：
            <input type="number" id="threshold" value="50" min="0" />
          </label>
        </fieldset>

        <button type="submit">Start</button>
      </form>
    </section>

    <!-- 實驗主畫面 -->
    <section id="experiment" hidden>
      <p id="status"></p>

      <div class="alternatives">
        <div class="option">
          <h2>左</h2>
          <p>payoffA：<span id="left-a"></span></p>
          <p>payoffB：<span id="left-b"></span></p>
        </div>
        <div class="option">
          <h2>右</h2>
          <p>payoffA：<span id="right-a"></span></p>
          <p>payoffB：<span id="right-b"></span></p>
        </div>
      </div>

      <div class="choices">
        <button id="choose-left">選左</button>
        <button id="choose-right">選右</button>
      </div>

      <h3>Debug</h3>
      <table>
        <thead>
          <tr><th>stage</th><th>iteration</th><th>stepSize</th></tr>
        </thead>
        <tbody id="debug-body"></tbody>
      </table>
    </section>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
